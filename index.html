<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <meta
      name="description"
      content="NetLura - Página de perfis inspirada na Netflix para seleção de usuários."
    />
    <title>NetLura</title>
  </head>
  <body>
    <!-- Conteúdo principal da página -->
    <main>
      <!-- Botão para alternar entre modo escuro e claro -->
      <button id="theme-toggle" aria-label="Alternar modo escuro/claro">
        🌙
      </button>
      <!-- Título principal da página -->
      <h1>Quem está assistindo?</h1>
      <!-- Seção que contém os perfis de usuário disponíveis -->
      <section aria-label="Perfis disponíveis">
        
        <!-- Lista não ordenada contendo todos os perfis -->
        <ul class="profiles">
          <!-- Primeiro perfil: Linus T. - leva ao catálogo -->
          <li>
            <a href="catalogo/catalogo.html" class="profile" target="_blank">
              <figure>
                <img
                  src="assets/profile-1.webp"
                  alt="Robô futurista com armadura metálica"
                />
                <figcaption>Linus T.</figcaption>
              </figure>
            </a>
          </li>
          <!-- Segundo perfil: Ada L. - perfil inativo (href="#") -->
          <li>
            <a href="#" class="profile">
              <figure>
                <img
                  src="assets/profile-2.webp"
                  alt="Personagem estilo fantasia com capa verde, acompanhado por uma coruja"
                />
                <figcaption>Ada L.</figcaption>
              </figure>
            </a>
          </li>
          <!-- Terceiro perfil: Alan T. - perfil inativo -->
          <li>
            <a href="#" class="profile">
              <figure>
                <img
                  src="assets/profile-3.webp"
                  alt="Avatar de menino com cabelo curto"
                />
                <figcaption>Alan T.</figcaption>
              </figure>
            </a>
          </li>
          <!-- Quarto perfil: Tim B. - perfil inativo -->
          <li>
            <a href="#" class="profile">
              <figure>
                <img
                  src="assets/profile-4.webp"
                  alt="Avatar de mulher com cabelo afro"
                />
                <figcaption>Tim B.</figcaption>
              </figure>
            </a>
          </li>
        </ul>
      </section>
    </main>

    <!-- Script JavaScript para funcionalidades interativas -->
    <script src="js/script.js" defer></script>
    <!-- defer: executa o script após o HTML ser completamente carregado -->
  </body>
</html>
