<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>NetLura</title>
  </head>
  <body>
    <main>
      <button id="theme-toggle" aria-label="Alternar modo escuro/claro">
        🌙
      </button>
      <h1>Quem está assistindo?</h1>
      <section aria-label="Perfis disponíveis">
        <ul class="profiles">
          <li>
            <a href="catalogo/catalogo.html" class="profile">
              <figure>
                <img
                  src="assets/profile-1.png"
                  alt="Robô futurista com armadura metálica"
                />
                <figcaption>Linus Torva</figcaption>
              </figure>
            </a>
          </li>
          <li>
            <a href="#" class="profile">
              <figure>
                <img
                  src="assets/profile-2.jpg"
                  alt="Personagem estilo fantasia com capa verde, acompanhado por uma coruja"
                />
                <figcaption>Ada Love</figcaption>
              </figure>
            </a>
          </li>
          <li>
            <a href="#" class="profile">
              <figure>
                <img
                  src="assets/profile-3.jpg"
                  alt="Avatar de menino com cabelo curto"
                />
                <figcaption>Alan Tur</figcaption>
              </figure>
            </a>
          </li>
          <li>
            <a href="#" class="profile">
              <figure>
                <img
                  src="assets/profile-4.png"
                  alt="Avatar de mulher com cabelo afro"
                />
                <figcaption>Tim Berners</figcaption>
              </figure>
            </a>
          </li>
        </ul>
      </section>
    </main>

    <script src="js/script.js" defer></script>
  </body>
</html>
