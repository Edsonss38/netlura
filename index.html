<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- Configuração básica -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS principal -->
    <link rel="stylesheet" href="style.css" />

    <!-- SEO (descrição da página) -->
    <meta
      name="description"
      content="NetLura - Página de perfis inspirada na Netflix para seleção de usuários."
    />

    <!-- Título da aba -->
    <title>NetLura</title>
  </head>

  <body>
    <main>
      <!-- Botão de alternar tema (dark/light) -->
      <button id="theme-toggle" aria-label="Alternar modo escuro/claro">
        🌙
      </button>

      <!-- Título principal -->
      <h1>Quem está assistindo?</h1>

      <!-- Seção de perfis -->
      <section aria-label="Perfis disponíveis">
        <!-- Lista de perfis -->
        <ul class="profiles">
          <!-- Perfil 1 (ativo → abre catálogo) -->
          <li>
            <a href="catalogo/catalogo.html" class="profile" target="_blank">
              <figure>
                <img
                  src="assets/profile-1.webp"
                  alt="Robô futurista com armadura metálica"
                  width="84"
                  height="84"
                  loading="lazy"
                />
                <figcaption>Linus T.</figcaption>
              </figure>
            </a>
          </li>

          <!-- Perfil 2 (inativo) -->
          <li>
            <a href="#" class="profile">
              <figure>
                <img
                  src="assets/profile-2.webp"
                  alt="Personagem fantasia com capa verde e coruja"
                  width="84"
                  height="84"
                  loading="lazy"
                />
                <figcaption>Ada L.</figcaption>
              </figure>
            </a>
          </li>

          <!-- Perfil 3 -->
          <li>
            <a href="#" class="profile">
              <figure>
                <img
                  src="assets/profile-3.webp"
                  alt="Avatar de menino com cabelo curto"
                  width="84"
                  height="84"
                  loading="lazy"
                />
                <figcaption>Alan T.</figcaption>
              </figure>
            </a>
          </li>

          <!-- Perfil 4 -->
          <li>
            <a href="#" class="profile">
              <figure>
                <img
                  src="assets/profile-4.webp"
                  alt="Avatar de mulher com cabelo afro"
                  width="84"
                  height="84"
                  loading="lazy"
                />
                <figcaption>Tim B.</figcaption>
              </figure>
            </a>
          </li>
        </ul>
      </section>
    </main>

    <!-- Script JS (carregado após HTML) -->
    <script src="js/script.js" defer></script>
  </body>
</html>
